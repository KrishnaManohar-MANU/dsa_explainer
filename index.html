<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DSA Explainer // Core Python Logic</title>
<link href="googleapis.com" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #07070a; --surface: #0f0f15; --surface2: #161622;
    --border: rgba(255,255,255,0.06); --border-hover: rgba(255,255,255,0.12);
    --text: #f3f3f6; --muted: #7e7e8c;
    --accent: #635bff; --accent-light: #8a84ff; --success: #00ffaa; --warn: #ffb800;
    --mono: 'Space Mono', monospace; --sans: 'Syne', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding: 3rem 1.5rem; line-height: 1.5; }
  .noise { position: fixed; inset: 0; pointer-events: none; z-index: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='w3.org id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.02'/%3E%3C/svg%3E"); }
  .wrapper { max-width: 680px; margin: 0 auto; position: relative; z-index: 1; }
  
  header { text-align: left; margin-bottom: 2.5rem; }
  .tag { font-family: var(--mono); font-size: 10px; color: var(--accent-light); letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; margin-bottom: 0.5rem; display: block; }
  h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; }
  h1 span { color: var(--accent-light); }

  .input-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; }
  textarea { width: 100%; min-height: 120px; background: #0a0a0f; border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: var(--mono); font-size: 13px; padding: 1rem; resize: vertical; transition: all 0.2s ease; outline: none; }
  textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99, 91, 255, 0.15); }
  
  .controls { display: flex; gap: 12px; margin-top: 1rem; }
  .btn { font-family: var(--sans); font-weight: 700; border-radius: 10px; padding: 12px 24px; cursor: pointer; transition: all 0.15s ease; border: none; font-size: 14px; }
  .btn-prime { background: var(--accent); color: #fff; flex: 1; }
  .btn-prime:hover { background: var(--accent-light); transform: translateY(-1px); }
  .btn-prime:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-sec { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-sec:hover { border-color: var(--border-hover); color: var(--text); }

  .error { background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.2); color: #ff8e8e; border-radius: 10px; padding: 12px; font-family: var(--mono); font-size: 12px; margin-bottom: 1.5rem; display: none; }
  
  .results-panel { display: none; flex-direction: column; gap: 16px; }
  
  /* Large Title Display Styling */
  .problem-heading { font-size: 24px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; margin-top: 0.5rem; padding-left: 4px; border-left: 4px solid var(--accent-light); padding-left: 12px; }

  .ui-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; position: relative; }
  .ui-card-title { font-size: 11px; font-family: var(--mono); font-weight: 700; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 1rem; display: flex; align-items: center; gap: 6px; }
  .ui-card-title::before { content: ''; width: 6px; height: 6px; background: var(--accent-light); border-radius: 50%; }
  
  .metrics { display: flex; gap: 16px; }
  .metric-box { flex: 1; background: var(--surface2); border-radius: 12px; padding: 1rem; border: 1px solid var(--border); }
  .metric-label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .metric-value { font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--warn); }
  
  .bullet-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .bullet-list li { position: relative; padding-left: 20px; font-size: 14px; color: #d1d1d6; line-height: 1.6; }
  .bullet-list li::before { content: "→"; position: absolute; left: 0; color: var(--accent-light); font-family: var(--mono); }
  
  .code-viewer { background: #060609; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-top: 0.5rem; }
  .code-header { background: #0c0c12; padding: 8px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .code-lang { font-family: var(--mono); font-size: 11px; color: var(--muted); text-transform: uppercase; }
  .copy-btn { background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-family: var(--mono); font-size: 10px; padding: 4px 8px; cursor: pointer; transition: all 0.2s; }
  .copy-btn:hover { color: #fff; border-color: var(--border-hover); }
  .copy-btn.copied { color: var(--success); border-color: var(--success); }
  pre { padding: 1rem; overflow-x: auto; margin: 0; }
  code { font-family: var(--mono); font-size: 13px; color: #e5e5ea; line-height: 1.6; white-space: pre-wrap; }

  .skeleton-stack { display: flex; flex-direction: column; gap: 8px; width: 100%; }
  .skeleton { height: 14px; background: linear-gradient(90deg, var(--surface2) 25%, #222230 50%, var(--surface2) 75%); background-size: 200% 100%; animation: loadingShift 1.4s infinite; border-radius: 4px; }
  @keyframes loadingShift { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body>
<div class="noise"></div>
<div class="wrapper">
  <header>
    <span class="tag">// Interactive Compiler Deconstruct</span>
    <h1>Logic over <span>Boilerplate</span></h1>
  </header>

  <div class="input-panel">
    <textarea id="rawInput" placeholder="Paste your LeetCode problem description here..."></textarea>
    <div class="controls">
      <button class="btn btn-prime" id="actionBtn" onclick="processProblem()">Deconstruct Core Logic</button>
      <button class="btn btn-sec" onclick="clearWorkspace()">Clear</button>
    </div>
  </div>

  <div class="error" id="errContainer"></div>

  <div class="results-panel" id="viewGroup">
    <!-- Large Title Display Component -->
    <div class="problem-heading" id="titleTarget"></div>

    <div class="ui-card">
      <div class="ui-card-title">PLAIN ENGLISH TRANSLATION</div>
      <ul class="bullet-list" id="expTarget"></ul>
    </div>

    <div class="ui-card">
      <div class="ui-card-title">STRATEGIC APPROACH CLUES</div>
      <ul class="bullet-list" id="appTarget"></ul>
    </div>

    <div class="metrics">
      <div class="metric-box">
        <div class="metric-label">TIME COMPLEXITY</div>
        <div class="metric-value" id="timeTarget">-</div>
      </div>
      <div class="metric-box">
        <div class="metric-label">SPACE COMPLEXITY</div>
        <div class="metric-value" id="spaceTarget">-</div>
      </div>
    </div>

    <div class="ui-card">
      <div class="ui-card-title">LEETCODE CORE FUNCTION ONLY</div>
      <div class="code-viewer">
        <div class="code-header">
          <span class="code-lang">Python 3 Core</span>
          <button class="copy-btn" id="copyBtn" onclick="copyCode()">Copy Logic</button>
        </div>
        <pre><code id="codeTarget"></code></pre>
      </div>
    </div>
  </div>
</div>

<script>
  let targetedCodeText = "";

  function getSkeleton(count = 3) {
    return `<div class="skeleton-stack">${Array(count).fill('<div class="skeleton"></div>').join('')}</div>`;
  }

  function formatAsBullets(data) {
    if (!data) return "<li>N/A</li>";
    if (Array.isArray(data)) {
      return data.map(item => `<li>${item}</li>`).join('');
    }
    return `<li>${data.toString().replace(/^-\s*/, '')}</li>`;
  }

  async function processProblem() {
    const rawText = document.getElementById('rawInput').value.trim();
    const errBox = document.getElementById('errContainer');
    const viewGroup = document.getElementById('viewGroup');
    const actionBtn = document.getElementById('actionBtn');

    errBox.style.display = 'none';
    if (!rawText) {
      errBox.textContent = "Error: Input box empty. Please copy and paste a problem description.";
      errBox.style.display = 'block';
      return;
    }

    viewGroup.style.display = 'flex';
    document.getElementById('titleTarget').textContent = "Analyzing LeetCode Matrix...";
    document.getElementById('expTarget').innerHTML = getSkeleton(3);
    document.getElementById('appTarget').innerHTML = getSkeleton(2);
    document.getElementById('timeTarget').innerHTML = "...";
    document.getElementById('spaceTarget').innerHTML = "...";
    document.getElementById('codeTarget').textContent = "# Executing token tracking maps...";
    
    actionBtn.disabled = true;
    const copyBtn = document.getElementById('copyBtn');
    copyBtn.className = "copy-btn";
    copyBtn.textContent = "Copy Logic";

    try {
      const apiResponse = await fetch('/api/explain', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ problem: rawText })
      });

      if (!apiResponse.ok) throw new Error("Server returned an bad response code.");
      const payload = await apiResponse.json();

      document.getElementById('titleTarget').textContent = payload.title || "LeetCode Problem Extraction";
      document.getElementById('expTarget').innerHTML = formatAsBullets(payload.explanation);
      document.getElementById('appTarget').innerHTML = formatAsBullets(payload.approach);
      document.getElementById('timeTarget').textContent = payload.time || "O(N)";
      document.getElementById('spaceTarget').textContent = payload.space || "O(1)";
      
      targetedCodeText = payload.solution || "# No code logic returned.";
      document.getElementById('codeTarget').textContent = targetedCodeText;

    } catch (err) {
      errBox.textContent = "Execution Error: The backend responded but data mapping fields broke. Try another prompt.";
      errBox.style.display = 'block';
    } finally {
      actionBtn.disabled = false;
    }
  }

  function copyCode() {
    if (!targetedCodeText) return;
    navigator.clipboard.writeText(targetedCodeText).then(() => {
      const copyBtn = document.getElementById('copyBtn');
      copyBtn.className = "copy-btn copied";
      copyBtn.textContent = "✓ Copied Code";
    });
  }

  function clearWorkspace() {
    document.getElementById('rawInput').value = '';
    document.getElementById('viewGroup').style.display = 'none';
    document.getElementById('errContainer').style.display = 'none';
    targetedCodeText = "";
  }
</script>
</body>
</html>
